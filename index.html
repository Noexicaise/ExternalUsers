<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outil de Décision - Matériel & Accès</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .hidden-field { display: none; }
        .loading-spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            width: 24px; height: 24px; border-radius: 50%;
            border-left-color: #4f46e5; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">Décision Matériel & Accès</h1>
            <p class="text-slate-500 mt-2 italic">Arbitrage partagé en temps réel</p>
            <div id="status-indicator" class="mt-2 text-xs font-medium text-slate-400 no-print flex items-center justify-center gap-2">
                Initialisation...
            </div>
        </header>

        <!-- Formulaire -->
        <div class="card p-6 mb-8 no-print">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Entité / Catégorie</label>
                    <select id="category" onchange="toggleOtherCategory(this.value)" class="w-full p-3 border border-slate-300 rounded-lg bg-white">
                        <option value="INASTI">INASTI</option>
                        <option value="Ombudsman">Ombudsman</option>
                        <option value="Cabinet Ministériel">Cabinet Ministériel</option>
                        <option value="Cabinet de Pensions">Cabinet de Pensions</option>
                        <option value="Audit Externe">Audit Externe</option>
                        <option value="Cour des Comptes">Cour des Comptes</option>
                        <option value="Consultant Externe">Consultant Externe</option>
                        <option value="Partenaire IT Externe">Partenaire IT Externe</option>
                        <option value="Universités">Universités</option>
                        <option value="Autre">-- Autre (Saisie libre) --</option>
                    </select>
                    <input type="text" id="other-category-name" placeholder="Nom de l'entité..." class="hidden-field mt-3 w-full p-3 border border-orange-300 rounded-lg bg-orange-50">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Matériel Requis</label>
                    <select id="hardware" onchange="toggleOtherHardware(this.value)" class="w-full p-3 border border-slate-300 rounded-lg bg-white">
                        <option value="Aucun Matériel (BYOD)">Aucun Matériel (BYOD)</option>
                        <option value="Laptop Standard">Laptop Standard</option>
                        <option value="Laptop Standard + Smartphone">Laptop Standard + Smartphone</option>
                        <option value="Smartphone/Tablette">Smartphone/Tablette</option>
                        <option value="Autre">-- Autre (Saisie libre) --</option>
                    </select>
                    <input type="text" id="other-hardware-name" placeholder="Précisez le matériel..." class="hidden-field mt-3 w-full p-3 border border-emerald-300 rounded-lg bg-emerald-50">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Types d'Accès</label>
                    <div id="access-options" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 p-4 border border-slate-300 rounded-lg bg-slate-50">
                        <label class="flex items-center p-2 rounded cursor-pointer"><input type="checkbox" value="VPN" class="mr-3"> VPN</label>
                        <label class="flex items-center p-2 rounded cursor-pointer"><input type="checkbox" value="Theseos" class="mr-3"> Theseos</label>
                        <label class="flex items-center p-2 rounded cursor-pointer"><input type="checkbox" value="O365" class="mr-3"> O365</label>
                        <label class="flex items-center p-2 rounded cursor-pointer"><input type="checkbox" value="App .NET" class="mr-3"> App .NET</label>
                        <label class="flex items-center p-2 rounded cursor-pointer"><input type="checkbox" id="check-other-access" onchange="toggleOtherAccessField(this.checked)" class="mr-3"> <span class="font-bold">Autre...</span></label>
                    </div>
                    <input type="text" id="other-access-text" placeholder="Saisissez l'accès spécifique..." class="hidden-field mt-3 w-full p-3 border border-indigo-300 rounded-lg bg-indigo-50">
                </div>

                <div class="md:col-span-2">
                    <button id="add-btn" onclick="addDecision()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-lg transition-all disabled:opacity-50">
                        Valider la décision
                    </button>
                </div>
            </div>
        </div>

        <!-- Matrice -->
        <div class="card overflow-hidden">
            <div class="bg-slate-50 px-6 py-4 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold text-slate-800">Matrice de Décision</h2>
                <button onclick="clearAll()" class="text-sm text-red-600 hover:text-red-800 font-medium no-print">Réinitialiser tout</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600 uppercase text-xs font-semibold">
                            <th class="px-6 py-4 border-b">Catégorie</th>
                            <th class="px-6 py-4 border-b">Matériel</th>
                            <th class="px-6 py-4 border-b">Accès</th>
                            <th class="px-6 py-4 border-b no-print">Action</th>
                        </tr>
                    </thead>
                    <tbody id="decision-table-body" class="divide-y divide-slate-200 text-sm">
                        <tr><td colspan="4" class="px-6 py-12 text-center text-slate-400">Connexion à la base de données...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- ÉTAPE CRUCIALE POUR GITHUB ---
        // Remplacez ces valeurs par celles de votre console Firebase (Project Settings)
        const firebaseConfig = {
            apiKey: "AIzaSyDq6ChjjTWckfBP9z1oLvpXIp9rPriUKvc",
            authDomain: "externalusers-f112c.firebaseapp.com",
            projectId: "externalusers-f112c",
            storageBucket: "externalusers-f112c.firebasestorage.app",
            messagingSenderId: "383725496750",
            appId: "1:383725496750:web:595ffd58a4cb4fd5cd003f"
        };
        // ----------------------------------

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COLLECTION_PATH = "decisions_app_shared"; // Nom de votre collection

        let user = null;
        let decisions = [];

        const setStatus = (msg, loading = false) => {
            const el = document.getElementById('status-indicator');
            el.innerHTML = loading ? `<div class="loading-spinner"></div> <span>${msg}</span>` : `<span>● ${msg}</span>`;
            el.className = `mt-2 text-xs font-medium flex items-center justify-center gap-2 ${loading ? 'text-indigo-500' : 'text-emerald-500'}`;
        };

        // Auth
        signInAnonymously(auth).then(cred => {
            user = cred.user;
            setStatus("Connecté au Cloud");
            loadData();
        }).catch(err => {
            console.error(err);
            setStatus("Erreur de configuration Firebase", false);
            document.getElementById('decision-table-body').innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500 font-bold">CONFIG FIREBASE MANQUANTE<br><small>Éditez le code source pour ajouter vos clés API.</small></td></tr>`;
        });

        // Real-time
        const loadData = () => {
            onSnapshot(collection(db, COLLECTION_PATH), (snap) => {
                decisions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderTable();
            });
        };

        window.renderTable = () => {
            const body = document.getElementById('decision-table-body');
            body.innerHTML = decisions.length ? '' : '<tr><td colspan="4" class="p-12 text-center text-slate-400 italic">Aucune donnée.</td></tr>';
            
            decisions.sort((a,b) => a.category.localeCompare(b.category)).forEach(d => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="px-6 py-4 font-bold text-slate-800">${d.category}</td>
                    <td class="px-6 py-4">${d.hardware}</td>
                    <td class="px-6 py-4">${d.access.split('|').map(a => `<span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs mr-1 font-bold">${a}</span>`).join('')}</td>
                    <td class="px-6 py-4 no-print"><button onclick="deleteRow('${d.id}')" class="text-red-400 hover:text-red-600">Supprimer</button></td>
                `;
                body.appendChild(row);
            });
        };

        window.addDecision = async () => {
            const btn = document.getElementById('add-btn');
            btn.disabled = true;

            let category = document.getElementById('category').value;
            if (category === 'Autre') category = document.getElementById('other-category-name').value.trim().toUpperCase();

            let hardware = document.getElementById('hardware').value;
            if (hardware === 'Autre') hardware = document.getElementById('other-hardware-name').value.trim();

            const access = Array.from(document.querySelectorAll('#access-options input:checked')).map(cb => {
                return cb.id === 'check-other-access' ? document.getElementById('other-access-text').value.trim() : cb.value;
            }).filter(v => v);

            if (!category || !access.length) { alert("Complétez le formulaire."); btn.disabled = false; return; }

            try {
                const id = category.toLowerCase().replace(/\s+/g, '_');
                await setDoc(doc(db, COLLECTION_PATH, id), { category, hardware, access: access.join('|') });
            } catch (e) { alert("Erreur Firebase : Vérifiez vos règles de sécurité Firestore."); }
            btn.disabled = false;
        };

        window.deleteRow = (id) => deleteDoc(doc(db, COLLECTION_PATH, id));
        window.clearAll = () => { if(confirm("Tout effacer ?")) decisions.forEach(d => deleteRow(d.id)); };

        // UI toggles
        window.toggleOtherCategory = v => document.getElementById('other-category-name').style.display = v === 'Autre' ? 'block' : 'none';
        window.toggleOtherHardware = v => document.getElementById('other-hardware-name').style.display = v === 'Autre' ? 'block' : 'none';
        window.toggleOtherAccessField = c => document.getElementById('other-access-text').style.display = c ? 'block' : 'none';
    </script>
</body>
</html>
